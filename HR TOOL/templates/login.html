{% extends "base.html" %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center mt-5" style="min-height: 50vh;">
    <div class="card shadow-lg" style="width: 400px; border-radius: 10px;">
        <div class="card-body">
            <h2 class="card-title text-center">Login</h2>
            <form action="/login" method="post" class="mt-4">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="border-radius: 5px;">Login</button>
            </form>
            <p class="mt-3 text-center">Don't have an account? <a href="/register">Register here</a>.</p>
            {% if get_flashed_messages() %}
            <div class="alert alert-danger mt-3">
                {% for message in get_flashed_messages() %}
                    <p>{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}
        </div>
    </div>
</div>
<footer class="bg-dark text-white py-3 mt-5">
    <div class="container text-center">
        <p>&copy; 2024 Job Hunter AI. All rights reserved.</p>
    </div>
</footer>
{% endblock %}
