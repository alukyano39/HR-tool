<!DOCTYPE html>
<html>
<head>
    <title>Job Hunter AI - Job Vacancy Searcher</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background-color: #c7d9ec;
        }
        body {
            display: flex;
            flex-direction: column;
        }
        .container {
            flex: 1;
        }
        .jumbotron {
            background-image: url('/static/BANNER.png');
            background-size: cover;
            color: white;
            text-shadow: 2px 2px 4px #000000;
        }
        .card {
            margin-bottom: 20px;
        }
        .footer {
            background-color: #5783b0;
            color: white;
            padding: 10px 0;
            text-align: center;
        }
        .form-container {
            max-width: 500px;
            margin: auto;
        }
        .btn-darkblue {
            background-color: #0047ab;
            color: white;
        }
        .btn-darkblue:hover {
            background-color: #003380;
            color: white;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="#">Job Hunter AI</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="#">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Contact</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Jumbotron -->
    <div class="jumbotron jumbotron-fluid text-center">
        <div class="container">
            <h1 class="display-4">Find Your Dream Job</h1>
            <p class="lead">Welcome to Job Hunter AI - Your Gateway to Exciting Career Opportunities</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">

        <!-- User Name Form -->
        <div class="row mt-5">
            <div class="col-md-12">
                <h2 class="text-center">Enter Your Name</h2>
                <div class="form-container mt-3">
                    <form action="/upload" method="post">
                        <div class="form-group">
                            <label for="name">Name:</label>
                            <input type="text" id="name" name="name" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-darkblue btn-block">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="container">
            <p>&copy; 2024 Job Hunter AI. All rights reserved.</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
