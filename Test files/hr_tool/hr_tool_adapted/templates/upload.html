<!DOCTYPE html>
<html>
<head>
    <title>Upload CV</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background-color: #c7d9ec;
        }
        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .form-container {
            max-width: 500px;
            width: 100%;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-top: 20px; /* Adjusted margin top */
        }
        .form-container h1 {
            text-align: center;
            margin-bottom: 0px; /* Adjusted margin bottom */
        }
        .btn-darkblue {
            background-color: #0047ab;
            color: white;
        }
        .btn-darkblue:hover {
            background-color: #003380;
            color: white;
        }
        .footer {
            background-color: #5783b0;
            color: white;
            padding: 10px 0;
            text-align: center;
            width: 100%;
            position: fixed;
            bottom: 0;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="#">Job Hunter AI</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="#">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Contact</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">

        <h1 class="mt-0">Hello, Pieter. Please upload your CV.</h1>

        <!-- Upload CV Form -->
        <div class="form-container mt-5"> <!-- Reduced mt-5 to mt-3 for form-container -->
            <form action="/keyword" method="post" enctype="multipart/form-data" class="mt-4">
                <input type="hidden" name="name" value="Pieter">
                <div class="form-group">
                    <input type="file" name="file" accept=".pdf" class="form-control-file" required>
                </div>
                <button type="submit" class="btn btn-darkblue btn-block">Upload</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="container">
            <p>&copy; 2024 Job Hunter AI. All rights reserved.</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
